<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PUBG 随机武器挑战</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-map="erangel">
  <div id="app" class="app-shell">

    <!-- ========== 1. 设置页 ========== -->
    <section id="view-setup" class="view active">
      <div class="container">
        <div class="hero-panel">
          <div class="hero-kicker">PUBG 四排娱乐小工具</div>
          <h1 class="title">PUBG 随机武器挑战</h1>
          <p class="subtitle">卓神是也</p>
          <div class="hero-tags">
            <span class="hero-tag">随机de枪械</span>
            <span class="hero-tag">特殊de卡牌</span>
            <span class="hero-tag">主人de惩罚</span>
          </div>
        </div>

        <div class="setup-section">
          <h2>玩家昵称</h2>
          <div class="player-inputs">
            <input type="text" id="player-1" placeholder="玩家1" maxlength="12">
            <input type="text" id="player-2" placeholder="玩家2" maxlength="12">
            <input type="text" id="player-3" placeholder="玩家3" maxlength="12">
            <input type="text" id="player-4" placeholder="玩家4" maxlength="12">
          </div>
        </div>

        <div class="setup-grid">
          <div class="setup-section">
            <h2>选择地图</h2>
            <div id="map-selector" class="map-grid"></div>
          </div>

          <div id="map-preview" class="map-preview"></div>
        </div>

        <div class="setup-section">
          <h2>游戏设置</h2>
          <div class="settings-row">
            <label>
              总局数
              <select id="total-rounds">
                <option value="3">3局</option>
                <option value="5" selected>5局</option>
              </select>
            </label>
            <label>
              转盘模式
              <select id="wheel-mode">
                <option value="sequential">轮流转</option>
                <option value="simultaneous">同时转</option>
              </select>
            </label>
          </div>
        </div>

        <button id="btn-start" class="btn btn-primary btn-large" onclick="App.startGame()">开始游戏</button>
      </div>
    </section>

    <!-- ========== 2. 首轮抽卡 ========== -->
    <section id="view-initial-cards" class="view">
      <div class="container">
        <div class="section-head">
          <h2>首轮抽卡</h2>
          <p class="subtitle">每人抽 1 张特殊事件卡，可留到后面的关键回合使用。</p>
        </div>
        <div id="initial-cards-area" class="cards-area"></div>
        <button id="btn-cards-done" class="btn btn-primary btn-large" onclick="App.finishInitialCards()" style="display:none">全员抽卡完毕，进入第 1 局</button>
      </div>
    </section>

    <!-- ========== 3. 回合主页 ========== -->
    <section id="view-round" class="view">
      <div class="container">
        <div class="view-topbar">
          <div class="info-chip" id="round-map-chip"></div>
          <div class="info-chip" id="round-mode-chip"></div>
          <div class="info-chip" id="round-progress-chip"></div>
        </div>

        <div class="round-header">
          <h2>第 <span id="round-number">1</span> 局</h2>
          <div class="progress-track">
            <span id="round-progress-bar"></span>
          </div>
          <div class="round-score-summary" id="round-score-summary"></div>
          <div class="round-tip" id="round-tip"></div>
        </div>

        <div id="player-status-cards" class="player-cards-grid"></div>

        <div class="round-actions">
          <button id="btn-use-cards" class="btn btn-secondary" onclick="App.openCardUse()">使用卡牌</button>
          <button id="btn-spin-weapons" class="btn btn-primary" onclick="App.startWeaponSpin()">抽武器</button>
          <button id="btn-spin-scopes" class="btn btn-secondary" onclick="App.spinScopes()" disabled>抽瞄准镜</button>
          <button id="btn-ready" class="btn btn-accent" onclick="App.showLoadout()" disabled>全员就绪，开打！</button>
        </div>
      </div>
    </section>

    <!-- ========== 4. 武器抽取 ========== -->
    <section id="view-weapon-draw" class="view">
      <div class="container">
        <div class="view-topbar">
          <div class="info-chip" id="draw-map-chip"></div>
          <div class="info-chip" id="draw-order-chip"></div>
        </div>
        <h2>武器抽取 — <span id="draw-player-name"></span></h2>
        <p class="subtitle" id="draw-subtitle">第1把 主武器</p>
        <div class="draw-container">
          <div class="draw-card" id="draw-card">
            <div class="draw-card-inner">
              <div class="draw-weapon-name" id="draw-weapon-name">?</div>
              <div class="draw-weapon-info" id="draw-weapon-info">点击下方按钮抽取</div>
            </div>
          </div>
        </div>
        <div id="draw-history" class="draw-history"></div>
        <button id="btn-draw" class="btn btn-primary btn-large" onclick="WeaponDraw.draw()">抽取！</button>
      </div>
    </section>

    <!-- ========== 5. 装备总览 ========== -->
    <section id="view-loadout" class="view">
      <div class="container">
        <div class="view-topbar">
          <div class="info-chip" id="loadout-map-chip"></div>
          <div class="info-chip" id="loadout-round-chip"></div>
        </div>
        <h2>本局装备总览</h2>
        <p class="subtitle" id="loadout-subtitle">确认限制、武器和倍镜后就可以出发。</p>
        <div id="loadout-display" class="loadout-grid"></div>
        <div id="active-effects" class="active-effects"></div>
        <button class="btn btn-primary btn-large" onclick="App.goToMatch()">出发！开打！</button>
      </div>
    </section>

    <!-- ========== 6. 计分页 ========== -->
    <section id="view-scoring" class="view">
      <div class="container">
        <div class="view-topbar">
          <div class="info-chip" id="scoring-map-chip"></div>
          <div class="info-chip" id="scoring-round-chip"></div>
        </div>
        <h2>第 <span id="scoring-round-number">1</span> 局结算</h2>
        <p class="subtitle">输入每人本局伤害数字，系统会按尾数、枪型和卡牌效果自动结算。</p>
        <div id="damage-inputs" class="damage-inputs"></div>
        <button id="btn-calculate" class="btn btn-primary btn-large" onclick="Scoring.calculate()">开始结算</button>

        <div id="scoring-animation" class="scoring-animation" style="display:none"></div>
        <div id="round-ranking" class="ranking" style="display:none"></div>

        <div id="post-round-cards" style="display:none">
          <h3>抽取事件卡</h3>
          <div id="post-round-card-area"></div>
        </div>

        <button id="btn-next-round" class="btn btn-primary btn-large" style="display:none" onclick="App.nextRound()">下一局</button>
      </div>
    </section>

    <!-- ========== 7. 惩罚页 ========== -->
    <section id="view-punishment" class="view">
      <div class="container">
        <div class="view-topbar">
          <div class="info-chip" id="punishment-phase-chip"></div>
          <div class="info-chip" id="punishment-round-chip"></div>
        </div>
        <h2>惩罚时间！</h2>
        <p class="subtitle">阶段总分垫底者抽取 1 张惩罚卡，效果持续下一局。</p>
        <div id="phase-summary" class="phase-summary"></div>
        <div id="punishment-area" class="punishment-area"></div>
        <button id="btn-punishment-done" class="btn btn-primary btn-large" onclick="App.afterPunishment()">继续</button>
      </div>
    </section>

    <!-- ========== 8. 终局页 ========== -->
    <section id="view-final" class="view">
      <div class="container">
        <div class="view-topbar">
          <div class="info-chip" id="final-map-chip"></div>
          <div class="info-chip" id="final-rounds-chip"></div>
        </div>
        <h2>最终排名</h2>
        <div id="final-summary" class="final-summary"></div>
        <div id="final-ranking" class="final-ranking"></div>
        <div id="score-details" class="score-details"></div>
        <button class="btn btn-primary btn-large" onclick="App.restart()">再来一轮！</button>
      </div>
    </section>

    <!-- ========== 卡牌使用弹窗 ========== -->
    <div id="modal-overlay" class="modal-overlay" style="display:none">
      <div class="modal" id="modal-content"></div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/wheel.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
